<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>auth.js unit tests</title>
  <style>
    body { font-family: monospace; padding: 1rem; }
    .pass { color: green; }
    .fail { color: red;   }
  </style>
</head>
<body>
  <h1>auth.js unit tests</h1>
  <pre id="output"></pre>
  <script type="module">
    import {
      generateCodeVerifier,
      generateCodeChallenge,
      generateState,
      storeTokens,
      getAccessToken,
      clearTokens,
      classifyRefreshError,
      refreshTokens,
    } from '../app/auth.js';

    const out = document.getElementById('output');
    let passed = 0, failed = 0;

    function assert(label, condition, detail = '') {
      if (condition) {
        out.innerHTML += `<span class="pass">✓ ${label}</span>\n`;
        passed++;
      } else {
        out.innerHTML += `<span class="fail">✗ ${label}${detail ? ': ' + detail : ''}</span>\n`;
        failed++;
      }
    }

    // ── generateCodeVerifier ──────────────────────────────────────────────────
    const v1 = generateCodeVerifier();
    assert('generateCodeVerifier returns a string', typeof v1 === 'string');
    assert('generateCodeVerifier length is 86 chars', v1.length === 86, `got ${v1.length}`);
    assert('generateCodeVerifier uses base64url chars only', /^[A-Za-z0-9\-_]+$/.test(v1));

    const v2 = generateCodeVerifier();
    assert('generateCodeVerifier produces unique values', v1 !== v2);

    // ── generateCodeChallenge ─────────────────────────────────────────────────
    // Known test vector: SHA-256('abc') base64url = 'ungWv48Bz-pBQUDeXa4iI7ADYaOWF3qctBD_YfIAFa0'
    const challenge = await generateCodeChallenge('abc');
    assert(
      'generateCodeChallenge produces correct SHA-256 for "abc"',
      challenge === 'ungWv48Bz-pBQUDeXa4iI7ADYaOWF3qctBD_YfIAFa0',
      `got ${challenge}`
    );
    assert('generateCodeChallenge returns base64url chars only', /^[A-Za-z0-9\-_]+$/.test(challenge));

    const c2 = await generateCodeChallenge(v1);
    assert('generateCodeChallenge returns a string', typeof c2 === 'string');
    assert('generateCodeChallenge result has no padding', !c2.includes('='));

    // ── generateState ─────────────────────────────────────────────────────────
    const s1 = generateState();
    assert('generateState returns a 32-char hex string', s1.length === 32 && /^[0-9a-f]+$/.test(s1));
    const s2 = generateState();
    assert('generateState produces unique values', s1 !== s2);

    // ── storeTokens / getAccessToken / clearTokens ────────────────────────────
    storeTokens({ access_token: 'tok_abc', refresh_token: 'ref_xyz', expires_in: 3600 });
    assert('getAccessToken returns stored access token', getAccessToken() === 'tok_abc');
    assert('refresh_token stored in sessionStorage', sessionStorage.getItem('refresh_token') === 'ref_xyz');
    assert('token_expiry stored', sessionStorage.getItem('token_expiry') !== null);

    // Token rotation: new refresh token overwrites old
    storeTokens({ access_token: 'tok_new', refresh_token: 'ref_new', expires_in: 3600 });
    assert('storeTokens overwrites refresh token on rotation', sessionStorage.getItem('refresh_token') === 'ref_new');

    // Missing refresh_token in response (not rotated) — should not overwrite
    storeTokens({ access_token: 'tok_new2', expires_in: 3600 });
    assert('storeTokens keeps existing refresh_token when not in response', sessionStorage.getItem('refresh_token') === 'ref_new');

    clearTokens();
    assert('clearTokens removes access_token', getAccessToken() === null);
    assert('clearTokens removes refresh_token', sessionStorage.getItem('refresh_token') === null);
    assert('clearTokens removes token_expiry', sessionStorage.getItem('token_expiry') === null);

    // ── classifyRefreshError ──────────────────────────────────────────────────
    assert('400 invalid_grant is terminal',
      classifyRefreshError({ status: 400, body: { error: 'invalid_grant' } }) === 'terminal');
    assert('401 from token endpoint is terminal',
      classifyRefreshError({ status: 401, body: null }) === 'terminal');
    assert('429 is transient',
      classifyRefreshError({ status: 429, body: null }) === 'transient');
    assert('503 is transient',
      classifyRefreshError({ status: 503, body: null }) === 'transient');
    assert('400 with other error is transient',
      classifyRefreshError({ status: 400, body: { error: 'invalid_request' } }) === 'transient');
    assert('network failure (status 0) is transient',
      classifyRefreshError({ status: 0, body: null }) === 'transient');

    // ── refreshTokens: single-flight + error kinds (fetch stubbed) ─────────────
    const realFetch = globalThis.fetch;

    // Single-flight: two concurrent refreshes issue exactly one POST.
    {
      sessionStorage.setItem('refresh_token', 'ref_live');
      let calls = 0;
      globalThis.fetch = async () => {
        calls++;
        await new Promise(r => setTimeout(r, 20)); // keep both callers in-flight
        return new Response(
          JSON.stringify({ access_token: 'tok_refreshed', expires_in: 3600 }),
          { status: 200, headers: { 'Content-Type': 'application/json' } }
        );
      };
      const [a, b] = await Promise.all([refreshTokens('cid'), refreshTokens('cid')]);
      assert('single-flight: concurrent refreshes issue one POST', calls === 1, `got ${calls}`);
      assert('single-flight: both callers get the same token',
        a.access_token === 'tok_refreshed' && b.access_token === 'tok_refreshed');
      assert('single-flight: stores the refreshed access token', getAccessToken() === 'tok_refreshed');
    }

    // Terminal: 401 from the token endpoint surfaces err.kind === 'terminal'.
    {
      sessionStorage.setItem('refresh_token', 'ref_live');
      globalThis.fetch = async () =>
        new Response(JSON.stringify({ error: 'invalid_client' }),
          { status: 401, headers: { 'Content-Type': 'application/json' } });
      let kind = null;
      try { await refreshTokens('cid'); } catch (e) { kind = e.kind; }
      assert('refreshTokens: 401 surfaces kind=terminal', kind === 'terminal', `got ${kind}`);
    }

    // Transient: 500 surfaces err.kind === 'transient' and does NOT clear tokens.
    {
      sessionStorage.setItem('refresh_token', 'ref_keep');
      globalThis.fetch = async () =>
        new Response('upstream error', { status: 500 });
      let kind = null;
      try { await refreshTokens('cid'); } catch (e) { kind = e.kind; }
      assert('refreshTokens: 500 surfaces kind=transient', kind === 'transient', `got ${kind}`);
      assert('refreshTokens: transient failure keeps refresh_token',
        sessionStorage.getItem('refresh_token') === 'ref_keep');
    }

    globalThis.fetch = realFetch; // restore
    clearTokens();

    // ── Summary ───────────────────────────────────────────────────────────────
    out.innerHTML += `\n${passed} passed, ${failed} failed`;
  </script>
</body>
</html>
